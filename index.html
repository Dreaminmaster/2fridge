<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#efd6a7" />
    <meta name="description" content="手机端优先的低多边形 3D 互动冰箱。" />
    <title>口袋冰箱 · Pocket Fridge</title>
  </head>
  <body>
    <main id="app" class="app-shell">
      <section id="stage" class="stage" aria-label="3D 互动冰箱">
        <canvas id="scene"></canvas>

        <header class="top-bar">
          <div class="brand" aria-label="口袋冰箱">
            <span class="brand-mark" aria-hidden="true">▦</span>
            <span>口袋冰箱</span>
          </div>
          <div class="top-actions">
            <button id="helpButton" class="icon-button" type="button" aria-label="使用说明">?</button>
            <button id="resetButton" class="icon-button" type="button" aria-label="清空冰箱">↺</button>
          </div>
        </header>

        <div class="camera-controls" aria-label="视角控制">
          <button id="zoomInButton" class="control-button" type="button" aria-label="放大冰箱">+</button>
          <button id="zoomOutButton" class="control-button" type="button" aria-label="缩小冰箱">−</button>
          <button id="resetViewButton" class="control-button control-button--reset" type="button" aria-label="恢复默认视角">⌂</button>
        </div>

        <p id="gestureHint" class="gesture-hint">拖动旋转 · 双指缩放 · 轻点柜门或食物</p>

        <button id="foodToggle" class="food-toggle" type="button" aria-controls="foodDrawer" aria-expanded="false">
          <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M7 11h18l-2 14H9L7 11Zm4-5 5 5 5-5"/></svg>
          <span>添加</span>
        </button>

        <section id="inventoryDock" class="inventory-dock" aria-label="冰箱容量">
          <button id="inventoryToggle" class="inventory-summary" type="button" aria-controls="inventoryDrawer" aria-expanded="false">
            <span class="inventory-summary__title">冰箱内容</span>
            <span id="inventoryCount" class="inventory-summary__count">0 / 29</span>
            <span class="inventory-summary__chevron">⌃</span>
          </button>
          <div id="zoneMeters" class="zone-meters"></div>
        </section>

        <aside id="foodDrawer" class="drawer drawer--food" aria-hidden="true">
          <div class="drawer-handle" aria-hidden="true"></div>
          <div class="drawer-header">
            <div>
              <h2>添加食材</h2>
              <p>系统会自动分配到合适且空闲的位置</p>
            </div>
            <button id="foodDrawerClose" class="icon-button icon-button--plain" type="button" aria-label="关闭食材面板">×</button>
          </div>
          <label class="search-field">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m16 16 5 5"/></svg>
            <input id="foodSearch" type="search" placeholder="搜索牛肉、鸡蛋、可乐……" autocomplete="off" />
          </label>
          <div id="categoryTabs" class="category-tabs" role="tablist" aria-label="食材分类"></div>
          <div id="foodGrid" class="food-grid"></div>
        </aside>

        <aside id="inventoryDrawer" class="drawer drawer--inventory" aria-hidden="true">
          <div class="drawer-handle" aria-hidden="true"></div>
          <div class="drawer-header">
            <div>
              <h2>冰箱内容</h2>
              <p>可以逐件移除，空槽会自动重新利用</p>
            </div>
            <button id="inventoryDrawerClose" class="icon-button icon-button--plain" type="button" aria-label="关闭库存面板">×</button>
          </div>
          <div id="inventorySections" class="inventory-sections"></div>
        </aside>

        <section id="itemSheet" class="item-sheet" aria-hidden="true">
          <div id="itemSheetIcon" class="item-sheet__icon"></div>
          <div class="item-sheet__content">
            <strong id="itemSheetName"></strong>
            <span id="itemSheetMeta"></span>
          </div>
          <button id="removeSelectedItem" class="danger-button" type="button">移除</button>
          <button id="itemSheetClose" class="icon-button icon-button--plain" type="button" aria-label="关闭">×</button>
        </section>

        <div id="toast" class="toast" role="status" aria-live="polite"></div>
      </section>

      <div id="scrim" class="scrim" hidden></div>

      <section id="helpSheet" class="modal-sheet" aria-hidden="true">
        <div class="modal-sheet__card">
          <button class="icon-button icon-button--plain modal-sheet__close" data-close-modal type="button" aria-label="关闭">×</button>
          <h2>如何使用</h2>
          <div class="help-grid">
            <article><b>拖动</b><span>旋转查看冰箱侧面和柜门内侧</span></article>
            <article><b>双指或滚轮</b><span>平滑放大和缩小冰箱</span></article>
            <article><b>轻点柜门</b><span>分别打开冷藏区和冷冻区</span></article>
            <article><b>轻点食物</b><span>查看位置并单独移除</span></article>
          </div>
        </div>
      </section>

      <section id="confirmSheet" class="modal-sheet" aria-hidden="true">
        <div class="modal-sheet__card modal-sheet__card--compact">
          <h2>清空整个冰箱？</h2>
          <p>所有已经添加的食材都会从当前设备移除。</p>
          <div class="modal-actions">
            <button class="secondary-button" data-close-modal type="button">取消</button>
            <button id="confirmReset" class="danger-button danger-button--wide" type="button">确认清空</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
