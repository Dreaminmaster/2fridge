name: Validate and clean UI and door fixes

on:
  push:
    branches:
      - fix-door-hitbox-wall-ui-copy-v2

permissions:
  contents: write

concurrency:
  group: validate-ui-door-fixes
  cancel-in-progress: true

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix-door-hitbox-wall-ui-copy-v2
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Remove one-time tooling
        run: |
          rm -f scripts/apply-ui-door-fixes.mjs
          rm -f .github/workflows/apply-ui-door-fixes.yml

      - name: Commit validated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove one-time patch tooling after validation"
          git push origin HEAD:fix-door-hitbox-wall-ui-copy-v2
