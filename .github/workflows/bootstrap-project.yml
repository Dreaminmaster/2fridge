name: Build and Deploy Pocket Fridge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pocket-fridge-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate project
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Record successful build
        shell: bash
        run: |
          cat > BUILD_STATUS.md <<EOF
          # Production build status

          Pocket Fridge passed validation and its production bundle was created successfully.

          - Source commit: \`${GITHUB_SHA}\`
          - Built at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD_STATUS.md
          if ! git diff --cached --quiet; then
            git commit -m "Record successful Pocket Fridge build"
            git push origin HEAD:main
          fi

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout latest main for deployment record
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record successful deployment
        shell: bash
        run: |
          cat > DEPLOYMENT_STATUS.md <<EOF
          # GitHub Pages deployment

          Pocket Fridge was successfully built, validated, and deployed by GitHub Actions.

          - URL: https://dreaminmaster.github.io/2fridge/
          - Deployment source: \`${GITHUB_SHA}\`
          - Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_STATUS.md
          if ! git diff --cached --quiet; then
            git commit -m "Record successful GitHub Pages deployment"
            git push origin HEAD:main
          fi
