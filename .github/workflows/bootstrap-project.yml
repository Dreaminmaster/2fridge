name: Build and Deploy Pocket Fridge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pocket-fridge-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore complete project from bootstrap archive
        if: ${{ hashFiles('bootstrap/archive.part00') != '' }}
        shell: bash
        run: |
          cat bootstrap/archive.part* | base64 --decode > /tmp/pocket-fridge.tar.gz
          tar -xzf /tmp/pocket-fridge.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/deploy.yml
          sed -i 's#\.github/workflows/deploy.yml#\.github/workflows/bootstrap-project.yml#g' README.md
          sed -i 's#../.github/workflows/deploy.yml#../.github/workflows/bootstrap-project.yml#g' scripts/validate.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build complete Pocket Fridge experience"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate project
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
