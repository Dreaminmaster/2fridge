name: Build and Deploy Pocket Fridge

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYMENT_STATUS.md
      - BUILD_STATUS.md
      - TEST_FAILURE.md
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pocket-fridge-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate project
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/pocket-fridge-test.log
      - name: Record validation failure
        if: failure() && github.event_name != 'pull_request_target'
        shell: bash
        run: |
          {
            echo '# Pocket Fridge validation failure'
            echo
            echo "- Workflow run: \`${GITHUB_RUN_ID}\`"
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Recorded at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo '```text'
            awk '
              /^not ok / { capture=1; remaining=38 }
              capture { print; remaining -= 1; if (remaining <= 0) capture=0 }
            ' /tmp/pocket-fridge-test.log
            echo
            echo '--- test totals ---'
            tail -n 14 /tmp/pocket-fridge-test.log
            echo '```'
          } > TEST_FAILURE.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TEST_FAILURE.md
          git commit -m "Record Pocket Fridge validation failure" || true
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Build production site
        run: npm run build
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Checkout latest main
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Record successful deployment
        if: github.event_name != 'pull_request_target'
        shell: bash
        run: |
          cat > DEPLOYMENT_STATUS.md <<STATUS
          # GitHub Pages deployment

          Pocket Fridge was deployed successfully.

          - Workflow run: \`${GITHUB_RUN_ID}\`
          - Source commit: \`${GITHUB_SHA}\`
          - URL: https://dreaminmaster.github.io/2fridge/
          - Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          STATUS
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_STATUS.md
          git commit -m "Record successful Pocket Fridge deployment" || true
          git pull --rebase origin main
          git push origin HEAD:main

  diagnostics:
    if: always() && github.event_name != 'pull_request_target'
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Record workflow result
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          cat > BUILD_STATUS.md <<STATUS
          # Pocket Fridge workflow status

          - Workflow run: \`${GITHUB_RUN_ID}\`
          - Source commit: \`${GITHUB_SHA}\`
          - Build: \`${BUILD_RESULT}\`
          - Deploy: \`${DEPLOY_RESULT}\`
          - Recorded at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          STATUS
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD_STATUS.md
          git commit -m "Record Pocket Fridge workflow status" || true
          git pull --rebase origin main
          git push origin HEAD:main
